<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Messaging App</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
      }
      .wrap {
        display: none;
        height: 100vh;
      }
      .login {
        display: grid;
        place-items: center;
        height: 100vh;
      }
      .card {
        width: min(420px, 92vw);
        background: #1e293b;
        padding: 20px;
        border-radius: 12px;
      }
      .app {
        display: flex;
        width: 100%;
        height: 100%;
      }
      .sidebar {
        width: 290px;
        border-right: 1px solid #334155;
        padding: 14px;
        overflow-y: auto;
        background: #111827;
      }
      .chat {
        flex: 1;
        display: flex;
        flex-direction: column;
      }
      .chat-head {
        border-bottom: 1px solid #334155;
        padding: 14px;
        font-weight: bold;
      }
      .messages {
        flex: 1;
        overflow-y: auto;
        padding: 14px;
      }
      .row {
        display: flex;
        gap: 8px;
        padding: 8px 14px 14px;
        border-top: 1px solid #334155;
      }
      input, button {
        border-radius: 8px;
        border: 1px solid #334155;
        background: #0b1220;
        color: #e2e8f0;
        padding: 10px;
      }
      input { width: 100%; }
      button {
        cursor: pointer;
        background: #2563eb;
        border-color: #2563eb;
      }
      .item {
        padding: 8px;
        border: 1px solid #334155;
        border-radius: 8px;
        margin-bottom: 6px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
      }
      .actions {
        display: flex;
        gap: 6px;
      }
      .actions button {
        padding: 6px 8px;
      }
      .muted {
        color: #94a3b8;
        font-size: 12px;
      }
      .msg {
        margin-bottom: 10px;
        background: #1e293b;
        border: 1px solid #334155;
        padding: 8px;
        border-radius: 8px;
      }
      h3 { margin: 14px 0 8px; }
      .me { color: #86efac; }
      #error { color: #fca5a5; min-height: 20px; }
    </style>
  </head>
  <body>
    <div class="login" id="login">
      <div class="card">
        <h2>Messaging App</h2>
        <p class="muted">Chat in group rooms or one-on-one.</p>
        <input id="usernameInput" placeholder="Choose a username" />
        <div style="height: 10px"></div>
        <button id="joinBtn">Join</button>
        <p id="error"></p>
      </div>
    </div>

    <div class="wrap" id="wrap">
      <div class="app">
        <aside class="sidebar">
          <div><b id="meLabel"></b></div>
          <h3>Direct messages</h3>
          <div id="usersList"></div>
          <h3>Groups</h3>
          <div style="display:flex; gap:6px; margin-bottom:8px;">
            <input id="groupInput" placeholder="New group name" />
            <button id="createGroupBtn">Create</button>
          </div>
          <div id="groupsList"></div>
        </aside>

        <section class="chat">
          <div class="chat-head" id="chatTitle">Select a chat</div>
          <div class="messages" id="messages"></div>
          <div class="row">
            <input id="messageInput" placeholder="Type a message..." />
            <button id="sendBtn">Send</button>
          </div>
        </section>
      </div>
    </div>

    <script>
      let ws;
      let me = "";
      let users = [];
      let groups = [];
      let current = null;
      const byConversation = new Map();

      const el = (id) => document.getElementById(id);
      const usersList = el("usersList");
      const groupsList = el("groupsList");
      const messages = el("messages");
      const chatTitle = el("chatTitle");
      const error = el("error");

      function dmId(a, b) {
        return `dm:${[a, b].sort().join(":")}`;
      }
      function groupId(name) {
        return `group:${name}`;
      }

      function connect(username) {
        ws = new WebSocket(`ws://${location.host}/ws`);

        ws.onopen = () => ws.send(JSON.stringify({ type: "register", username }));
        ws.onmessage = (event) => handleServer(JSON.parse(event.data));
        ws.onclose = () => {
          error.textContent = "Disconnected from server.";
        };
      }

      function handleServer(data) {
        if (data.type === "error") {
          error.textContent = data.message;
          return;
        }
        if (data.type === "info") {
          error.textContent = data.message;
          setTimeout(() => {
            if (error.textContent === data.message) error.textContent = "";
          }, 1800);
          return;
        }
        if (data.type === "init") {
          me = data.username;
          users = data.users || [];
          groups = data.groups || [];
          el("meLabel").textContent = `You: ${me}`;
          el("login").style.display = "none";
          el("wrap").style.display = "block";
          renderUsers();
          renderGroups();
          return;
        }
        if (data.type === "users") {
          users = data.users || [];
          renderUsers();
          return;
        }
        if (data.type === "groups") {
          groups = data.groups || [];
          renderGroups();
          return;
        }
        if (data.type === "message") {
          const msg = data.message;
          const list = byConversation.get(msg.conversationId) || [];
          list.push(msg);
          byConversation.set(msg.conversationId, list);
          if (current && current.id === msg.conversationId) renderMessages(current.id);
          return;
        }
        if (data.type === "history") {
          byConversation.set(data.conversationId, data.messages || []);
          if (current && current.id === data.conversationId) renderMessages(current.id);
        }
      }

      function renderUsers() {
        const others = users.filter((u) => u !== me);
        usersList.innerHTML = others
          .map(
            (u) => `
              <div class="item">
                <span>${u}</span>
                <div class="actions">
                  <button onclick="openDm('${u}')">Chat</button>
                </div>
              </div>`
          )
          .join("") || `<div class="muted">No other users online.</div>`;
      }

      function renderGroups() {
        groupsList.innerHTML =
          groups
            .map((g) => {
              const joined = g.members.includes(me);
              return `
                <div class="item">
                  <div>
                    <div>${g.name}</div>
                    <div class="muted">${g.members.length} member(s)</div>
                  </div>
                  <div class="actions">
                    ${joined ? `<button onclick="openGroup('${g.name}')">Open</button>` : `<button onclick="joinGroup('${g.name}')">Join</button>`}
                  </div>
                </div>`;
            })
            .join("") || `<div class="muted">No groups yet.</div>`;
      }

      function renderMessages(conversationId) {
        const list = byConversation.get(conversationId) || [];
        messages.innerHTML = list
          .map((m) => {
            const who = m.from === me ? `<span class="me">${m.from}</span>` : m.from;
            return `<div class="msg"><b>${who}</b>: ${escapeHtml(m.text)}<div class="muted">${new Date(m.timestamp).toLocaleString()}</div></div>`;
          })
          .join("");
        messages.scrollTop = messages.scrollHeight;
      }

      function escapeHtml(text) {
        return text
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;");
      }

      window.openDm = (user) => {
        const id = dmId(me, user);
        current = { kind: "dm", user, id };
        chatTitle.textContent = `Direct chat with ${user}`;
        ws.send(JSON.stringify({ type: "fetch_history", conversationId: id }));
      };

      window.joinGroup = (name) => {
        ws.send(JSON.stringify({ type: "join_group", name }));
      };

      window.openGroup = (name) => {
        const id = groupId(name);
        current = { kind: "group", name, id };
        chatTitle.textContent = `Group: ${name}`;
        ws.send(JSON.stringify({ type: "fetch_history", conversationId: id }));
      };

      el("joinBtn").onclick = () => {
        const username = el("usernameInput").value.trim();
        if (!username) {
          error.textContent = "Enter a username.";
          return;
        }
        error.textContent = "";
        connect(username);
      };

      el("createGroupBtn").onclick = () => {
        const name = el("groupInput").value.trim();
        if (!name) return;
        ws.send(JSON.stringify({ type: "create_group", name }));
        el("groupInput").value = "";
      };

      el("sendBtn").onclick = () => {
        const text = el("messageInput").value.trim();
        if (!text || !current) return;

        if (current.kind === "dm") {
          ws.send(JSON.stringify({ type: "send_dm", to: current.user, text }));
        } else {
          ws.send(JSON.stringify({ type: "send_group", group: current.name, text }));
        }
        el("messageInput").value = "";
      };

      el("messageInput").addEventListener("keydown", (e) => {
        if (e.key === "Enter") el("sendBtn").click();
      });
    </script>
  </body>
</html>
