<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f172a" />
    <link rel="manifest" href="/static/manifest.webmanifest" />
    <link rel="icon" href="/static/logo.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/static/logo.svg" />
    <title>Messager</title>
    <style>
      body { margin: 0; font-family: Arial, sans-serif; background: #0f172a; color: #e2e8f0; }
      .wrap { display: none; height: 100vh; }
      .login { display: grid; place-items: center; height: 100vh; }
      .card { width: min(460px, 92vw); background: #1e293b; padding: 20px; border-radius: 12px; }
      .app { display: flex; width: 100%; height: 100%; }
      .sidebar { width: 340px; border-right: 1px solid #334155; padding: 14px; overflow-y: auto; background: #111827; }
      .chat { flex: 1; display: flex; flex-direction: column; }
      .chat-head { border-bottom: 1px solid #334155; padding: 14px; font-weight: bold; }
      .messages { flex: 1; overflow-y: auto; padding: 14px; }
      .row { display: flex; gap: 8px; padding: 8px 14px 14px; border-top: 1px solid #334155; }
      input, button { border-radius: 8px; border: 1px solid #334155; background: #0b1220; color: #e2e8f0; padding: 10px; }
      input { width: 100%; }
      button { cursor: pointer; background: #2563eb; border-color: #2563eb; }
      .item { padding: 8px; border: 1px solid #334155; border-radius: 8px; margin-bottom: 6px; display: flex; justify-content: space-between; gap: 8px; align-items: center; }
      .actions { display: flex; gap: 6px; }
      .actions button { padding: 6px 8px; }
      .muted { color: #94a3b8; font-size: 12px; }
      .msg { margin-bottom: 10px; background: #1e293b; border: 1px solid #334155; padding: 8px; border-radius: 8px; }
      h3 { margin: 14px 0 8px; }
      .me { color: #86efac; }
      .dot { width: 9px; height: 9px; border-radius: 999px; display: inline-block; margin-right: 6px; }
      .online { background: #22c55e; }
      .offline { background: #64748b; }
      #error { color: #fca5a5; min-height: 20px; }
    </style>
  </head>
  <body>
    <div class="login" id="login">
      <div class="card">
        <h2>Messager</h2>
        <p class="muted">Private chat by email. Add contacts by email to message them.</p>
        <input id="emailInput" placeholder="Email address" />
        <div style="height:8px"></div>
        <input id="passwordInput" type="password" placeholder="Password (min 6 chars)" />
        <div style="height:10px"></div>
        <div style="display:flex; gap:8px;">
          <button id="registerBtn">Register</button>
          <button id="loginBtn">Login</button>
        </div>
        <div style="height:8px"></div>
        <button id="installBtn" style="display:none; width:100%;">Install App</button>
        <p id="error"></p>
      </div>
    </div>

    <div class="wrap" id="wrap">
      <div class="app">
        <aside class="sidebar">
          <div><b id="meLabel"></b></div>
          <h3>Contacts</h3>
          <div style="display:flex; gap:6px; margin-bottom:8px;">
            <input id="contactInput" placeholder="friend@email.com" />
            <button id="addContactBtn">Add</button>
          </div>
          <div id="contactsList"></div>

          <h3>Groups</h3>
          <div style="display:flex; gap:6px; margin-bottom:8px;">
            <input id="groupInput" placeholder="New group name" />
            <button id="createGroupBtn">Create</button>
          </div>
          <div id="groupsList"></div>
        </aside>

        <section class="chat">
          <div class="chat-head" id="chatTitle">Select a contact or group</div>
          <div class="messages" id="messages"></div>
          <div class="row">
            <input id="messageInput" placeholder="Type a message..." />
            <button id="sendBtn">Send</button>
          </div>
        </section>
      </div>
    </div>

    <script>
      let ws;
      let me = "";
      let contacts = [];
      let groups = [];
      let current = null;
      let installPrompt = null;
      const byConversation = new Map();

      const el = (id) => document.getElementById(id);
      const contactsList = el("contactsList");
      const groupsList = el("groupsList");
      const messages = el("messages");
      const chatTitle = el("chatTitle");
      const error = el("error");

      function dmId(a, b) { return `dm:${[a, b].sort().join(":")}`; }
      function groupId(name) { return `group:${name}`; }
      function esc(text) { return String(text).replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;"); }

      function connect(authType, email, password) {
        const proto = location.protocol === "https:" ? "wss" : "ws";
        ws = new WebSocket(`${proto}://${location.host}/ws`);
        ws.onopen = () => ws.send(JSON.stringify({ type: authType, email, password }));
        ws.onmessage = (event) => handleServer(JSON.parse(event.data));
        ws.onclose = () => { error.textContent = "Disconnected."; };
      }

      function handleServer(data) {
        if (data.type === "error") { error.textContent = data.message; return; }
        if (data.type === "info") {
          error.textContent = data.message;
          setTimeout(() => { if (error.textContent === data.message) error.textContent = ""; }, 1500);
          return;
        }
        if (data.type === "init") {
          me = data.email;
          contacts = data.contacts || [];
          groups = data.groups || [];
          el("meLabel").textContent = `You: ${me}`;
          el("login").style.display = "none";
          el("wrap").style.display = "block";
          renderContacts();
          renderGroups();
          return;
        }
        if (data.type === "contacts") { contacts = data.contacts || []; renderContacts(); return; }
        if (data.type === "groups") { groups = data.groups || []; renderGroups(); return; }
        if (data.type === "message") {
          const msg = data.message;
          const list = byConversation.get(msg.conversationId) || [];
          list.push(msg);
          byConversation.set(msg.conversationId, list);
          if (current && current.id === msg.conversationId) renderMessages(current.id);
          return;
        }
        if (data.type === "history") {
          byConversation.set(data.conversationId, data.messages || []);
          if (current && current.id === data.conversationId) renderMessages(current.id);
        }
      }

      function renderContacts() {
        contactsList.innerHTML = contacts.map((c) => `
          <div class="item">
            <span><span class="dot ${c.online ? "online" : "offline"}"></span>${esc(c.email)}</span>
            <div class="actions"><button onclick="openDm('${encodeURIComponent(c.email)}')">Chat</button></div>
          </div>`).join("") || `<div class="muted">No contacts yet.</div>`;
      }

      function renderGroups() {
        groupsList.innerHTML = groups.map((g) => {
          const joined = g.members.includes(me);
          return `
            <div class="item">
              <div>
                <div>${esc(g.name)}</div>
                <div class="muted">${g.members.length} member(s)</div>
              </div>
              <div class="actions">
                ${joined ? `<button onclick="openGroup('${encodeURIComponent(g.name)}')">Open</button>` : `<button onclick="joinGroup('${encodeURIComponent(g.name)}')">Join</button>`}
              </div>
            </div>`;
        }).join("") || `<div class="muted">No groups yet.</div>`;
      }

      function renderMessages(conversationId) {
        const list = byConversation.get(conversationId) || [];
        messages.innerHTML = list.map((m) => {
          const who = m.from === me ? `<span class="me">${esc(m.from)}</span>` : esc(m.from);
          return `<div class="msg"><b>${who}</b>: ${esc(m.text)}<div class="muted">${new Date(m.timestamp).toLocaleString()}</div></div>`;
        }).join("");
        messages.scrollTop = messages.scrollHeight;
      }

      window.openDm = (encodedEmail) => {
        const email = decodeURIComponent(encodedEmail);
        current = { kind: "dm", email, id: dmId(me, email) };
        chatTitle.textContent = `Direct chat with ${email}`;
        ws.send(JSON.stringify({ type: "fetch_history", conversationId: current.id }));
      };

      window.joinGroup = (encodedName) => {
        ws.send(JSON.stringify({ type: "join_group", name: decodeURIComponent(encodedName) }));
      };

      window.openGroup = (encodedName) => {
        const name = decodeURIComponent(encodedName);
        current = { kind: "group", name, id: groupId(name) };
        chatTitle.textContent = `Group: ${name}`;
        ws.send(JSON.stringify({ type: "fetch_history", conversationId: current.id }));
      };

      function auth(action) {
        const email = el("emailInput").value.trim().toLowerCase();
        const password = el("passwordInput").value.trim();
        if (!email || !password) { error.textContent = "Enter email and password."; return; }
        if (password.length < 6) { error.textContent = "Password must be at least 6 characters."; return; }
        error.textContent = "";
        connect(action, email, password);
      }

      el("registerBtn").onclick = () => auth("register");
      el("loginBtn").onclick = () => auth("login");

      el("addContactBtn").onclick = () => {
        const email = el("contactInput").value.trim().toLowerCase();
        if (!email) return;
        ws.send(JSON.stringify({ type: "add_contact", email }));
        el("contactInput").value = "";
      };

      el("createGroupBtn").onclick = () => {
        const name = el("groupInput").value.trim();
        if (!name) return;
        ws.send(JSON.stringify({ type: "create_group", name }));
        el("groupInput").value = "";
      };

      el("sendBtn").onclick = () => {
        const text = el("messageInput").value.trim();
        if (!text || !current) return;
        if (current.kind === "dm") ws.send(JSON.stringify({ type: "send_dm", to: current.email, text }));
        else ws.send(JSON.stringify({ type: "send_group", group: current.name, text }));
        el("messageInput").value = "";
      };

      el("messageInput").addEventListener("keydown", (e) => { if (e.key === "Enter") el("sendBtn").click(); });
      el("passwordInput").addEventListener("keydown", (e) => { if (e.key === "Enter") auth("login"); });

      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("/static/service-worker.js");
      }

      window.addEventListener("beforeinstallprompt", (event) => {
        event.preventDefault();
        installPrompt = event;
        el("installBtn").style.display = "block";
      });

      el("installBtn").onclick = async () => {
        if (!installPrompt) return;
        installPrompt.prompt();
        await installPrompt.userChoice;
        installPrompt = null;
        el("installBtn").style.display = "none";
      };
    </script>
  </body>
</html>
